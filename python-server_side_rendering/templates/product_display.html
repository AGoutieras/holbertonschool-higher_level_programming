<!doctype html>
<html lang="en">
  <head>
    <title>Products</title>
  </head>
  <body>
    {% include 'header.html'%}
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        {% if error %} {{ error }} {% endif %} {% if not products %}
        <p>Product not found</p>
        {% else %} {% for product in products %}
        <tr>
          <td>{{product.name}}</td>
          <td>{{product.category}}</td>
          <td>{{product.price}}</td>
        </tr>
        {% endfor %} {% endif %}
      </tbody>
    </table>
    {% include 'footer.html'%}
  </body>
</html>
