<!doctype html>
<html lang="en">
  <head>
    <title>Items List</title>
  </head>
  <body>
    {% include 'header.html'%}
    <h1>Items List</h1>
    <ul>
      {% if not items %}
        <p>No items found</p>
      {% endif %}
      {% for item in items %}
        <li>{{item}}</li>
      {% endfor %}
    </ul>
    {% include 'footer.html'%}
  </body>
</html>
